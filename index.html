<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <div class="hero-img">
          <img
            class="hero-img"
            src="./images/illustration-hero.svg"
            alt="illustration"
          />
        </div>

        <div class="hero-text">
          <h2 class="hero-header">Order Summary</h2>
        </div>

        <div class="hero-paragraph">
          <p>
            You can now listen to millions of songs, <br />
            audiobooks, and podcasts on any device <br />
            anywhere you like!
          </p>
        </div>
      </div>

      <div class="pricing">
        <div class="price">
          <div class="pricing-left">
            <div class="pricing-img">
              <img
                class="pricing-icon"
                src="./images/icon-music.svg"
                alt="music-icon"
              />
            </div>

            <div class="pricing-text">
              <h3>Annual Plan</h3>
              <p>$59.99/year</p>
            </div>
          </div>
          <div class="picing-right">
            <a href="" class="change">Change</a>
          </div>
        </div>
      </div>

      <div class="payment-button">
        <button class="btn">Proceed to Payment</button>
      </div>

      <div class="cancel-order-link">
        <a class="cancle-order" href="#">Cancle Order</a>
      </div>

      <div class="footer">
        <footer>
          Challenge by
          <a href="https://www.frontendmentor.io?ref=challenge"
            >Frontend Mentor</a
          >. Coded by
          <a href="https://github.com/Onlyjola21"> <br />Rasaq Jolayemi</a>.
        </footer>
      </div>
    </div>
  </body>
</html>
